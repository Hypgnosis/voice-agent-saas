<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin · Voice Agent</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        /* ── Tokens ──────────────────────────────────── */
        :root {
            --bg: #faf9f7;
            --white: #fff;
            --panel: rgba(255, 255, 255, .85);
            --border: #e8e6e1;
            --border-focus: #8b5cf6;
            --input-bg: #f5f4f1;
            --v50: #f5f3ff;
            --v100: #ede9fe;
            --v200: #ddd6fe;
            --v400: #a78bfa;
            --v500: #8b5cf6;
            --v600: #7c3aed;
            --v700: #6d28d9;
            --emerald: #10b981;
            --amber: #f59e0b;
            --rose: #f43f5e;
            --text: #1c1917;
            --text2: #57534e;
            --text3: #a8a29e;
            --r: 14px;
            --r-sm: 10px;
            --r-xs: 8px;
            --shadow: 0 2px 8px rgba(0, 0, 0, .05);
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        html {
            font-size: 14px
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased
        }

        button {
            font: inherit;
            cursor: pointer;
            border: none;
            background: none
        }

        a {
            color: var(--v600);
            text-decoration: none
        }

        a:hover {
            text-decoration: underline
        }

        /* ── Layout ──────────────────────────────────── */
        .app {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px
        }

        .topbar h1 {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: -.02em
        }

        .topbar h1 span {
            color: var(--v600)
        }

        .topbar-actions {
            display: flex;
            gap: 8px
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: var(--r-xs);
            font-size: .82rem;
            font-weight: 600;
            transition: all .2s
        }

        .btn-primary {
            background: var(--v600);
            color: #fff;
            box-shadow: 0 2px 8px rgba(139, 92, 246, .3)
        }

        .btn-primary:hover {
            background: var(--v700);
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(139, 92, 246, .35)
        }

        .btn-secondary {
            background: var(--input-bg);
            color: var(--text2);
            border: 1px solid var(--border)
        }

        .btn-secondary:hover {
            background: var(--white);
            border-color: var(--text3)
        }

        .btn-danger {
            background: rgba(244, 63, 94, .08);
            color: var(--rose);
            border: 1px solid rgba(244, 63, 94, .2)
        }

        .btn-danger:hover {
            background: rgba(244, 63, 94, .15)
        }

        .btn-sm {
            padding: 5px 10px;
            font-size: .75rem
        }

        /* ── Cards Grid ──────────────────────────────── */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 14px
        }

        .card {
            background: var(--panel);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: var(--r);
            box-shadow: var(--shadow);
            padding: 20px;
            transition: all .25s ease;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            border-color: var(--v200);
            box-shadow: 0 4px 20px rgba(0, 0, 0, .08);
            transform: translateY(-2px)
        }

        .card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 12px
        }

        .card-name {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text)
        }

        .card-slug {
            font-size: .72rem;
            color: var(--text3);
            font-family: monospace;
            background: var(--input-bg);
            padding: 2px 6px;
            border-radius: 4px
        }

        .card-badge {
            padding: 3px 8px;
            border-radius: 6px;
            font-size: .65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .04em;
        }

        .badge-active {
            background: rgba(16, 185, 129, .1);
            color: var(--emerald)
        }

        .badge-inactive {
            background: rgba(168, 162, 158, .1);
            color: var(--text3)
        }

        .card-desc {
            font-size: .82rem;
            color: var(--text2);
            line-height: 1.5;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden
        }

        .card-stats {
            display: flex;
            gap: 16px;
            margin-bottom: 14px
        }

        .card-stat {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: .75rem;
            color: var(--text3)
        }

        .card-stat strong {
            color: var(--text);
            font-weight: 600
        }

        .card-actions {
            display: flex;
            gap: 6px;
            border-top: 1px solid var(--border);
            padding-top: 12px;
            flex-wrap: wrap
        }

        /* ── Modal ────────────────────────────────────── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .4);
            backdrop-filter: blur(4px);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.open {
            display: flex
        }

        .modal {
            background: var(--white);
            border-radius: var(--r);
            box-shadow: 0 20px 60px rgba(0, 0, 0, .15);
            width: 100%;
            max-width: 640px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 28px;
        }

        .modal h2 {
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 20px
        }

        .modal-close {
            position: absolute;
            top: 14px;
            right: 14px;
            font-size: 1.2rem;
            color: var(--text3);
            cursor: pointer
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 14px
        }

        .form-row.full {
            grid-template-columns: 1fr
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px
        }

        .form-label {
            font-size: .7rem;
            font-weight: 600;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: .06em
        }

        .form-input {
            padding: 8px 12px;
            border-radius: var(--r-xs);
            background: var(--input-bg);
            border: 1px solid transparent;
            color: var(--text);
            font-family: inherit;
            font-size: .84rem;
            outline: none;
            transition: all .2s;
            width: 100%;
        }

        .form-input:focus {
            background: var(--white);
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, .1)
        }

        textarea.form-input {
            resize: vertical;
            min-height: 80px;
            line-height: 1.55
        }

        .form-help {
            font-size: .68rem;
            color: var(--text3);
            margin-top: 2px
        }

        .modal-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--border)
        }

        /* ── Empty State ──────────────────────────────── */
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--text3)
        }

        .empty h3 {
            font-size: 1.1rem;
            color: var(--text2);
            margin-bottom: 6px
        }

        /* ── Toast ────────────────────────────────────── */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--text);
            color: #fff;
            padding: 10px 18px;
            border-radius: var(--r-xs);
            font-size: .84rem;
            font-weight: 500;
            box-shadow: 0 6px 20px rgba(0, 0, 0, .2);
            transform: translateY(100px);
            opacity: 0;
            transition: all .3s ease;
            z-index: 200;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1
        }

        /* ── Agent Link ───────────────────────────────── */
        .agent-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: .72rem;
            font-weight: 600;
            background: var(--v50);
            color: var(--v600);
            border: 1px solid var(--v200);
            transition: all .2s;
        }

        .agent-link:hover {
            background: var(--v100);
            text-decoration: none
        }
    </style>
</head>

<body>
    <div class="app">
        <div class="topbar">
            <div>
                <h1>📋 <span>Voice Agent</span> · Admin</h1>
                <p style="font-size:.78rem;color:var(--text3);margin-top:2px">Manage your business agents and knowledge
                    bases</p>
            </div>
            <div class="topbar-actions">
                <a href="/" class="btn btn-secondary">← Agent UI</a>
                <button class="btn btn-primary" onclick="openModal()">+ Add Business</button>
            </div>
        </div>

        <div class="cards" id="cards"></div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay" onclick="event.target===this&&closeModal()">
        <div class="modal">
            <h2 id="modalTitle">Add New Business</h2>
            <input type="hidden" id="editId">

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Business Name</label>
                    <input class="form-input" id="fName" placeholder="Sunshine Pet Grooming">
                </div>
                <div class="form-group">
                    <label class="form-label">Slug (URL-friendly ID)</label>
                    <input class="form-input" id="fSlug" placeholder="sunshine-pets">
                    <span class="form-help">Used in agent URL: /agent/<strong>slug</strong>/chat</span>
                </div>
            </div>

            <div class="form-row full">
                <div class="form-group">
                    <label class="form-label">Business Description</label>
                    <textarea class="form-input" id="fDesc" rows="2"
                        placeholder="Brief description of the business..."></textarea>
                </div>
            </div>

            <div class="form-row full">
                <div class="form-group">
                    <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:4px;">
                        <label class="form-label" style="margin-bottom:0;">Knowledge Base</label>
                        <label class="btn btn-sm btn-secondary" style="margin:0; cursor:pointer;">
                            📄 Upload PDF/DOCX
                            <input type="file" id="fDoc" style="display:none;" accept=".pdf,.txt,.docx"
                                onchange="extractDoc(this)">
                        </label>
                    </div>
                    <textarea class="form-input" id="fKB" rows="8"
                        placeholder="Add services, prices, hours, FAQ, location, policies — everything the AI agent should know about this business..."></textarea>
                    <span class="form-help">The AI will use this info to answer customer questions accurately</span>
                    <span class="form-help" id="docStatus" style="color:var(--v600); font-weight:600;"></span>
                </div>
            </div>

            <div class="form-row full">
                <div class="form-group">
                    <label class="form-label">Greeting Message</label>
                    <input class="form-input" id="fGreeting" placeholder="Thank you for calling! How can I help?">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">English Voice</label>
                    <select class="form-input" id="fVoiceEn">
                        <option value="en-US-AriaNeural">Aria · Warm</option>
                        <option value="en-US-JennyNeural">Jenny · Professional</option>
                        <option value="en-US-GuyNeural">Guy · Conversational</option>
                        <option value="en-US-DavisNeural">Davis · Authoritative</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Spanish Voice</label>
                    <select class="form-input" id="fVoiceEs">
                        <option value="es-MX-DaliaNeural">Dalia · MX</option>
                        <option value="es-MX-JorgeNeural">Jorge · MX</option>
                        <option value="es-ES-ElviraNeural">Elvira · ES</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Phone Number (Twilio)</label>
                    <input class="form-input" id="fPhone" placeholder="+1 555-123-4567">
                </div>
                <div class="form-group">
                    <label class="form-label">WhatsApp Number</label>
                    <input class="form-input" id="fWhatsApp" placeholder="+52 333-456-7890">
                </div>
            </div>

            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" id="saveBtn" onclick="saveBusiness()">Save Business</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API = '';

        async function loadBusinesses() {
            const res = await fetch(`${API}/api/businesses`);
            const list = await res.json();
            const el = document.getElementById('cards');

            if (list.length === 0) {
                el.innerHTML = `<div class="empty"><h3>No businesses yet</h3><p>Add your first business to get started</p></div>`;
                return;
            }

            el.innerHTML = list.map(b => `
            <div class="card">
                <div class="card-header">
                    <div>
                        <div class="card-name">${esc(b.name)}</div>
                        <span class="card-slug">${esc(b.slug)}</span>
                    </div>
                    <span class="card-badge ${b.active ? 'badge-active' : 'badge-inactive'}">
                        ${b.active ? '● Active' : '○ Inactive'}
                    </span>
                </div>
                <p class="card-desc">${esc(b.description || 'No description')}</p>
                <div class="card-stats">
                    <span class="card-stat">📞 <strong>${b.call_count}</strong> calls</span>
                    <span class="card-stat">🎙️ ${esc(b.voice_en.split('-')[2]?.replace('Neural', '') || '?')}</span>
                    <span class="card-stat">🌐 ${esc(b.language)}</span>
                </div>
                <div class="card-actions">
                    <a href="/?business=${b.slug}" class="agent-link">🎤 Test Agent</a>
                    <button class="btn btn-sm btn-secondary" onclick="embedBusiness('${b.slug}', '${esc(b.name)}')">&lt;/&gt; Embed</button>
                    <button class="btn btn-sm btn-secondary" onclick="editBusiness('${b.id}')">✏️ Edit</button>
                    <button class="btn btn-sm btn-secondary" onclick="viewLogs('${b.id}','${esc(b.name)}')">📊 Logs</button>
                    <button class="btn btn-sm btn-danger" onclick="deleteBusiness('${b.id}','${esc(b.name)}')">🗑️</button>
                </div>
            </div>
        `).join('');
        }

        function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        function openModal(data) {
            document.getElementById('modalTitle').textContent = data ? 'Edit Business' : 'Add New Business';
            document.getElementById('editId').value = data?.id || '';
            document.getElementById('fName').value = data?.name || '';
            document.getElementById('fSlug').value = data?.slug || '';
            document.getElementById('fDesc').value = data?.description || '';
            document.getElementById('fKB').value = data?.knowledge_base || '';
            document.getElementById('fGreeting').value = data?.greeting || 'Hello, thank you for calling. How can I assist you?';
            document.getElementById('fVoiceEn').value = data?.voice_en || 'en-US-AriaNeural';
            document.getElementById('fVoiceEs').value = data?.voice_es || 'es-MX-DaliaNeural';
            document.getElementById('fPhone').value = data?.phone_number || '';
            document.getElementById('fWhatsApp').value = data?.whatsapp_number || '';
            document.getElementById('modalOverlay').classList.add('open');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('open');
        }

        async function extractDoc(input) {
            const file = input.files[0];
            if (!file) return;

            const docsStatus = document.getElementById('docStatus');
            docsStatus.textContent = `Extracting text from ${file.name}...`;

            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch(`${API}/api/extract`, {
                    method: 'POST',
                    body: formData
                });

                if (!res.ok) throw new Error(await res.text());

                const data = await res.json();
                const kb = document.getElementById('fKB');
                kb.value = kb.value + "\n\n--- EXTRACTED FROM " + file.name + " ---\n" + data.text;
                docsStatus.textContent = `✅ Successfully added text from ${file.name}`;
                setTimeout(() => { docsStatus.textContent = ''; }, 3000);
            } catch (e) {
                console.error(e);
                docsStatus.textContent = `❌ Error extracting text`;
                toast('Error extracting document', true);
            }
            input.value = ''; // reset file input
        }

        async function saveBusiness() {
            const id = document.getElementById('editId').value;
            const body = {
                name: document.getElementById('fName').value,
                slug: document.getElementById('fSlug').value,
                description: document.getElementById('fDesc').value,
                knowledge_base: document.getElementById('fKB').value,
                greeting: document.getElementById('fGreeting').value,
                voice_en: document.getElementById('fVoiceEn').value,
                voice_es: document.getElementById('fVoiceEs').value,
                phone_number: document.getElementById('fPhone').value,
                whatsapp_number: document.getElementById('fWhatsApp').value,
            };

            const url = id ? `${API}/api/businesses/${id}` : `${API}/api/businesses`;
            const method = id ? 'PUT' : 'POST';

            const res = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
            });

            if (res.ok) {
                closeModal();
                loadBusinesses();
                toast(id ? 'Business updated!' : 'Business created!');
            } else {
                const err = await res.json();
                toast('Error: ' + (err.error || 'Unknown error'), true);
            }
        }

        async function editBusiness(id) {
            const res = await fetch(`${API}/api/businesses/${id}`);
            const data = await res.json();
            openModal(data);
        }

        async function deleteBusiness(id, name) {
            if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
            await fetch(`${API}/api/businesses/${id}`, { method: 'DELETE' });
            loadBusinesses();
            toast('Business deleted');
        }

        async function viewLogs(id, name) {
            const res = await fetch(`${API}/api/businesses/${id}/logs`);
            const logs = await res.json();
            if (logs.length === 0) {
                toast('No call logs yet for ' + name);
                return;
            }
            const logText = logs.slice(0, 20).map(l =>
                `[${new Date(l.timestamp).toLocaleString()}] ${l.channel.toUpperCase()}\n  Caller: ${l.caller_text}\n  Agent: ${l.agent_text}`
            ).join('\n\n');
            alert(`Recent calls for ${name}:\n\n${logText}`);
        }

        function toast(msg, isError) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.style.background = isError ? '#ef4444' : '#1c1917';
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 2500);
        }

        function embedBusiness(slug, name) {
            // Get the current base URL (e.g., https://yourdomain.com) of the deployed app
            const baseUrl = window.location.origin;
            const embedCode = `<iframe 
    src="${baseUrl}/?business=${slug}" 
    width="100%" 
    height="600" 
    style="border: none; border-radius: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.08);"
    allow="microphone"
></iframe>`;

            // We use prompt so they can easily copy it
            prompt(
                `Copy the code below to embed the ${name} AI agent into their website.\n\nSince it's an iframe, any updates you make to the prompt or the code will instantly update on their site automatically!`,
                embedCode
            );
        }

        loadBusinesses();
    </script>
</body>

</html>
